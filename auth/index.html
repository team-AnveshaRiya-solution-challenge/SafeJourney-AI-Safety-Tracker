<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safe Journey — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, #BE123C 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      overflow: hidden;
    }

    .login-container {
      width: 100%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.3);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from {
        transform: translateY(30px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo {
      width: 56px;
      height: 56px;
      background: var(--primary);
      color: white;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
    }

    .login-title {
      font-size: 1.75rem;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 8px;
    }

    .login-subtitle {
      color: #64748b;
      font-size: 0.95rem;
    }

    .auth-tabs {
      display: flex;
      background: #f1f5f9;
      padding: 4px;
      border-radius: 12px;
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: none;
      border-radius: 8px;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      transition: all 0.2s;
    }

    .auth-tab.active {
      background: white;
      color: var(--primary);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: 6px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.95rem;
      transition: all 0.2s;
      background: white;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .input-wrapper .material-symbols-outlined {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 1.25rem;
    }

    .btn-auth {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-auth:hover {
      background: #4f46e5;
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
    }

    .btn-auth:active {
      transform: translateY(0);
    }

    .btn-auth:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .auth-error {
      background: #fef2f2;
      color: #dc2626;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
      border: 1px solid #fee2e2;
    }

    .footer-link {
      text-align: center;
      margin-top: 24px;
      font-size: 0.85rem;
      color: #64748b;
    }

    .footer-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    /* Animation background */
    .bg-blobs {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: -1;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      width: 500px;
      height: 500px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      filter: blur(80px);
      animation: float 20s infinite alternate;
    }

    .blob-1 {
      top: -100px;
      right: -100px;
      background: rgba(247, 85, 123, 0.3);
    }

    .blob-2 {
      bottom: -100px;
      left: -100px;
      background: rgba(247, 85, 123, 0.3);
      animation-delay: -5s;
    }

    @keyframes float {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(100px, 100px) scale(1.2);
      }
    }
  </style>
</head>

<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">
        <span class="material-symbols-outlined" style="font-size: 2rem;">shield_person</span>
      </div>
      <h1 class="login-title">Safe Journey</h1>
      <p class="login-subtitle" id="authSubtitle">Welcome back! Please sign in.</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin">Sign In</button>
      <button class="auth-tab" id="tabSignup">Create Account</button>
    </div>

    <div class="auth-error" id="authError"></div>

    <form id="authForm">
      <div class="input-group" id="nameGroup" style="display: none;">
        <label for="regName">Full Name</label>
        <div class="input-wrapper">
          <span class="material-symbols-outlined">person</span>
          <input type="text" id="regName" placeholder="Priya Sharma">
        </div>
      </div>

      <div class="input-group" id="phoneGroup" style="display: none;">
        <label for="regPhone">Contact Number</label>
        <div class="input-wrapper">
          <span class="material-symbols-outlined">call</span>
          <input type="tel" id="regPhone" placeholder="+91 98765 43210">
        </div>
      </div>

      <div class="input-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <span class="material-symbols-outlined">mail</span>
          <input type="email" id="email" placeholder="priya@example.com" required>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <span class="material-symbols-outlined">lock</span>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="btn-auth" id="btnSubmit">
        <span id="btnText">Sign In</span>
        <span class="material-symbols-outlined">arrow_forward</span>
      </button>
    </form>

    <div class="footer-link">
      <span id="footerText">Don't have an account?</span>
      <a href="#" id="toggleAuth">Create one</a>
    </div>
  </div>

  <script type="module" src="../js/auth.js"></script>
</body>

</html>
